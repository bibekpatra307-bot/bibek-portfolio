<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter - Bibek Patra</title>
  <meta name="description" content="Subscribe to Bibek Patra's newsletter for latest updates." />
  <link rel="canonical" href="https://bibekpatra.site/newsletter" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode:'class', theme: { extend: { colors: { primary:'#6C3BFF', secondary:'#111827', accent:'#F59E0B' } } } }</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/global.css" />
</head>
<body class="bg-white text-gray-800 dark:bg-gray-900 dark:text-gray-200">
  <div id="navbar-placeholder"></div>
  <main class="pt-24 pb-20 max-w-xl mx-auto px-4 text-center">
    <h1 class="text-4xl font-bold mb-4">Newsletter</h1>
    <p class="mb-8">Get the latest articles, products, and tips straight to your inbox.</p>
    <form action="#" class="flex flex-col sm:flex-row gap-3 justify-center">
      <input type="email" placeholder="Enter your email" class="p-3 rounded-xl border dark:bg-gray-700 w-full" required />
      <button type="submit" class="bg-primary text-white px-6 py-3 rounded-xl font-semibold hover:bg-purple-700">Subscribe</button>
    </form>
  </main>
  <div id="footer-placeholder"></div>
  <script src="/js/script.js"></script>
</body>
</html>
