<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Bibek Patra</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/global.css" />
</head>
<body class="bg-gray-100 dark:bg-gray-900 flex items-center justify-center min-h-screen">
  <div class="glass p-8 rounded-2xl w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-6">Admin Login</h1>
    <form class="space-y-4">
      <input type="email" placeholder="Email" class="w-full p-3 rounded-xl border dark:bg-gray-700" required />
      <input type="password" placeholder="Password" class="w-full p-3 rounded-xl border dark:bg-gray-700" required />
      <button type="submit" class="w-full bg-primary text-white py-3 rounded-xl hover:bg-purple-700">Login</button>
    </form>
  </div>
</body>
</html>
