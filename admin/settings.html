<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Settings - Bibek Patra</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/global.css" />
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200">
  <div class="flex min-h-screen">
    <aside class="w-64 glass p-6 space-y-4 hidden md:block">
      <h2 class="text-xl font-bold text-primary">Admin</h2>
      <nav class="space-y-2">
        <a href="/admin/dashboard" class="block px-3 py-2 rounded-lg">Dashboard</a>
        <a href="/admin/books" class="block px-3 py-2 rounded-lg">Books</a>
        <a href="/admin/blog" class="block px-3 py-2 rounded-lg">Blog</a>
        <a href="/admin/users" class="block px-3 py-2 rounded-lg">Users</a>
        <a href="/admin/reviews" class="block px-3 py-2 rounded-lg">Reviews</a>
        <a href="/admin/settings" class="block px-3 py-2 rounded-lg bg-primary/10">Settings</a>
      </nav>
    </aside>
    <main class="flex-1 p-6 pt-20 md:pt-6">
      <h1 class="text-2xl font-bold mb-6">Settings</h1>
      <div class="glass p-6 rounded-2xl space-y-4">
        <div><label class="block font-medium">Site Name</label><input type="text" class="w-full p-2 rounded-lg border dark:bg-gray-700" value="Bibek Patra" /></div>
        <div><label class="block font-medium">Admin Email</label><input type="email" class="w-full p-2 rounded-lg border dark:bg-gray-700" value="admin@bibekpatra.site" /></div>
        <button class="bg-primary text-white px-6 py-2 rounded-lg">Save</button>
      </div>
    </main>
  </div>
</body>
</html>
