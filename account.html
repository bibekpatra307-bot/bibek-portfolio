<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account - Bibek Patra</title>
  <meta name="description" content="Sign in to your Bibek Patra account." />
  <link rel="canonical" href="https://bibekpatra.site/account" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode:'class', theme: { extend: { colors: { primary:'#6C3BFF', secondary:'#111827', accent:'#F59E0B' } } } }</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/global.css" />
</head>
<body class="bg-white text-gray-800 dark:bg-gray-900 dark:text-gray-200">
  <div id="navbar-placeholder"></div>
  <main class="pt-24 pb-20 max-w-md mx-auto px-4">
    <h1 class="text-3xl font-bold text-center mb-6">Login / Register</h1>
    <div class="glass p-6 rounded-2xl">
      <form class="space-y-4">
        <input type="email" placeholder="Email" class="w-full p-3 rounded-xl border dark:bg-gray-700" required />
        <input type="password" placeholder="Password" class="w-full p-3 rounded-xl border dark:bg-gray-700" required />
        <button type="submit" class="w-full bg-primary text-white py-3 rounded-xl hover:bg-purple-700">Login</button>
      </form>
      <p class="mt-4 text-sm text-center">Don't have an account? <a href="#" class="text-primary">Register</a></p>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="/js/script.js"></script>
</body>
</html>
